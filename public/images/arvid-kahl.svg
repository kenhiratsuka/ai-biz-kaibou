<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="6" fill="#8b5cf6"/>

  <text x="400" y="44" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Arvid Kahl のビジネスモデル</text>
  <text x="400" y="66" text-anchor="middle" font-size="12" fill="#64748b">SaaS売却経験 → 知識販売 = 年間約7,500万円</text>

  <!-- Phase 1 -->
  <rect x="30" y="100" width="160" height="80" rx="12" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="110" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#4c1d95">PHASE 1</text>
  <text x="110" y="145" text-anchor="middle" font-size="12" fill="#5b21b6">FeedbackPanda</text>
  <text x="110" y="163" text-anchor="middle" font-size="10" fill="#6d28d9">教師向けSaaS</text>
  <text x="110" y="178" text-anchor="middle" font-size="10" fill="#7c3aed">約830万円で売却</text>

  <!-- Arrow -->
  <line x1="190" y1="140" x2="240" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="215" y="132" text-anchor="middle" font-size="10" fill="#64748b">売却</text>

  <!-- Audience Building -->
  <rect x="240" y="100" width="160" height="80" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="320" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">オーディエンス</text>
  <text x="320" y="145" text-anchor="middle" font-size="11" fill="#475569">ニュースレター</text>
  <text x="320" y="163" text-anchor="middle" font-size="11" fill="#475569">3万人読者</text>
  <text x="320" y="178" text-anchor="middle" font-size="10" fill="#64748b">X 約8万フォロワー</text>

  <!-- Arrow -->
  <line x1="400" y1="140" x2="450" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Products -->
  <rect x="450" y="90" width="170" height="160" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="535" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">知識プロダクト</text>
  <rect x="465" y="125" width="140" height="28" rx="6" fill="#ede9fe"/>
  <text x="535" y="144" text-anchor="middle" font-size="11" fill="#5b21b6">書籍 約2,300〜4,500円</text>
  <rect x="465" y="161" width="140" height="28" rx="6" fill="#f1f5f9"/>
  <text x="535" y="180" text-anchor="middle" font-size="11" fill="#475569">有料ニュースレター</text>
  <rect x="465" y="197" width="140" height="28" rx="6" fill="#f1f5f9"/>
  <text x="535" y="216" text-anchor="middle" font-size="11" fill="#475569">スポンサー広告</text>
  <rect x="465" y="233" width="140" height="28" rx="6" fill="#f1f5f9"/>
  <text x="535" y="251" text-anchor="middle" font-size="11" fill="#475569">コンサルティング</text>

  <!-- Revenue -->
  <rect x="650" y="110" width="120" height="80" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="710" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">年間収益</text>
  <text x="710" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">約7,500万円</text>
  <text x="710" y="182" text-anchor="middle" font-size="10" fill="#64748b">（SaaS時代超え）</text>

  <line x1="620" y1="170" x2="648" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AI band -->
  <rect x="30" y="300" width="740" height="70" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="400" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b21a8">🤖 AI・自動化レイヤー</text>
  <text x="175" y="352" text-anchor="middle" font-size="11" fill="#7e22ce">Gumroad 販売・配信自動化</text>
  <text x="400" y="352" text-anchor="middle" font-size="11" fill="#7e22ce">AI執筆補助（リサーチ・要約）</text>
  <text x="620" y="352" text-anchor="middle" font-size="11" fill="#7e22ce">SNS投稿のリサイクル自動化</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
