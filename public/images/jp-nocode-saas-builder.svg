<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="6" fill="#0891b2"/>

  <text x="400" y="44" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">ノーコード×AI SaaSのビジネスモデル</text>
  <text x="400" y="66" text-anchor="middle" font-size="12" fill="#64748b">エンジニア歴なし → Bubble × Claude API → 月収約120万円</text>

  <!-- Customer -->
  <rect x="30" y="110" width="155" height="70" rx="12" fill="#cffafe" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="107" y="135" text-anchor="middle" font-size="12" fill="#155e75">👤 顧客</text>
  <text x="107" y="155" text-anchor="middle" font-size="11" fill="#0e7490">中小企業の営業担当</text>
  <text x="107" y="172" text-anchor="middle" font-size="10" fill="#0891b2">見積作成に1件30分かかる</text>

  <!-- Arrow -->
  <line x1="185" y1="145" x2="230" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Product -->
  <rect x="230" y="95" width="200" height="145" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="330" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">AI自動見積もりSaaS</text>
  <rect x="245" y="130" width="170" height="30" rx="6" fill="#cffafe"/>
  <text x="330" y="150" text-anchor="middle" font-size="11" fill="#0369a1">商品情報を入力するだけ</text>
  <rect x="245" y="168" width="170" height="30" rx="6" fill="#f1f5f9"/>
  <text x="330" y="188" text-anchor="middle" font-size="11" fill="#475569">Claude APIが見積書を生成</text>
  <rect x="245" y="206" width="170" height="25" rx="6" fill="#f1f5f9"/>
  <text x="330" y="223" text-anchor="middle" font-size="10" fill="#475569">PDF出力・メール送信まで自動</text>

  <!-- Arrow -->
  <line x1="430" y1="167" x2="475" y2="167" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Revenue -->
  <rect x="475" y="110" width="160" height="110" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="555" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">収益モデル</text>
  <text x="555" y="158" text-anchor="middle" font-size="11" fill="#047857">月額3万円 × 40社</text>
  <text x="555" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">月収 約120万円</text>
  <text x="555" y="200" text-anchor="middle" font-size="10" fill="#64748b">解約率 月3%以下</text>
  <text x="555" y="216" text-anchor="middle" font-size="10" fill="#64748b">（粘着性が高いB2B）</text>

  <!-- Build info -->
  <rect x="655" y="110" width="115" height="110" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="712" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">開発期間</text>
  <text x="712" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#ea580c">3ヶ月</text>
  <text x="712" y="180" text-anchor="middle" font-size="10" fill="#9a3412">エンジニア</text>
  <text x="712" y="196" text-anchor="middle" font-size="10" fill="#9a3412">経験なし</text>
  <text x="712" y="212" text-anchor="middle" font-size="10" fill="#9a3412">Bubble使用</text>

  <!-- AI band -->
  <rect x="30" y="300" width="740" height="75" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="400" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b21a8">🤖 AI・自動化レイヤー</text>
  <text x="155" y="348" text-anchor="middle" font-size="11" fill="#7e22ce">Claude API（コア機能）</text>
  <text x="155" y="363" text-anchor="middle" font-size="10" fill="#9333ea">見積もり内容の自動生成</text>
  <text x="390" y="348" text-anchor="middle" font-size="11" fill="#7e22ce">Bubble（ノーコード）</text>
  <text x="390" y="363" text-anchor="middle" font-size="10" fill="#9333ea">コードなしで全機能構築</text>
  <text x="615" y="348" text-anchor="middle" font-size="11" fill="#7e22ce">Stripe（自動課金）</text>
  <text x="615" y="363" text-anchor="middle" font-size="10" fill="#9333ea">請求・解約を完全自動化</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
