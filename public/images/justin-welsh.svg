<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="6" fill="#2563eb"/>

  <text x="400" y="44" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Justin Welsh のビジネスモデル</text>
  <text x="400" y="66" text-anchor="middle" font-size="12" fill="#64748b">LinkedIn 52万フォロワー × デジタル講座 = 年間約6.2億円・利益率86%</text>

  <!-- Audience -->
  <rect x="30" y="105" width="155" height="95" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="107" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">📣 オーディエンス</text>
  <text x="107" y="152" text-anchor="middle" font-size="11" fill="#1d4ed8">LinkedIn 52万人</text>
  <text x="107" y="170" text-anchor="middle" font-size="11" fill="#1d4ed8">X 45万人</text>
  <text x="107" y="188" text-anchor="middle" font-size="11" fill="#1d4ed8">ニュースレター 25万人</text>

  <!-- Arrow -->
  <line x1="185" y1="152" x2="230" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Products -->
  <rect x="230" y="90" width="195" height="165" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="327" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">デジタル講座</text>
  <rect x="245" y="125" width="165" height="32" rx="6" fill="#dbeafe"/>
  <text x="327" y="141" text-anchor="middle" font-size="11" fill="#1e40af">LinkedIn OS</text>
  <text x="327" y="154" text-anchor="middle" font-size="10" fill="#1d4ed8">約23,000円（買い切り）</text>
  <rect x="245" y="164" width="165" height="32" rx="6" fill="#f1f5f9"/>
  <text x="327" y="180" text-anchor="middle" font-size="11" fill="#475569">Content OS</text>
  <text x="327" y="193" text-anchor="middle" font-size="10" fill="#64748b">約23,000円（買い切り）</text>
  <rect x="245" y="203" width="165" height="32" rx="6" fill="#f1f5f9"/>
  <text x="327" y="219" text-anchor="middle" font-size="11" fill="#475569">Creator MBA</text>
  <text x="327" y="232" text-anchor="middle" font-size="10" fill="#64748b">高単価・基幹講座</text>

  <!-- Arrow -->
  <line x1="425" y1="172" x2="468" y2="172" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Revenue -->
  <rect x="468" y="105" width="160" height="130" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="548" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">2024年 実績</text>
  <text x="548" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">年間 約6.2億円</text>
  <text x="548" y="175" text-anchor="middle" font-size="11" fill="#047857">利益率 86%</text>
  <text x="548" y="195" text-anchor="middle" font-size="10" fill="#64748b">（本人がXで公開）</text>
  <text x="548" y="215" text-anchor="middle" font-size="11" fill="#047857">従業員 0人</text>
  <text x="548" y="230" text-anchor="middle" font-size="10" fill="#64748b">PA1名のみ</text>

  <!-- Source badge -->
  <rect x="648" y="105" width="122" height="75" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="709" y="130" text-anchor="middle" font-size="10" fill="#92400e">情報源</text>
  <text x="709" y="150" text-anchor="middle" font-size="10" fill="#b45309">本人X投稿</text>
  <text x="709" y="167" text-anchor="middle" font-size="9" fill="#78350f">（2025年1月公開）</text>

  <!-- AI band -->
  <rect x="30" y="300" width="740" height="75" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="400" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b21a8">🤖 AI・自動化レイヤー</text>
  <text x="155" y="348" text-anchor="middle" font-size="11" fill="#7e22ce">TweetHunter</text>
  <text x="155" y="363" text-anchor="middle" font-size="10" fill="#9333ea">SNS投稿の自動スケジュール</text>
  <text x="390" y="348" text-anchor="middle" font-size="11" fill="#7e22ce">AI文章補助</text>
  <text x="390" y="363" text-anchor="middle" font-size="10" fill="#9333ea">ニュースレター下書き生成</text>
  <text x="620" y="348" text-anchor="middle" font-size="11" fill="#7e22ce">Gumroad自動化</text>
  <text x="620" y="363" text-anchor="middle" font-size="10" fill="#9333ea">購入・配信・フォローを自動処理</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
