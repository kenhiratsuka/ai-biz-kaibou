<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="6" fill="#7c3aed"/>

  <text x="400" y="44" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Lenny Rachitsky のビジネスモデル</text>
  <text x="400" y="66" text-anchor="middle" font-size="12" fill="#64748b">無料ニュースレター 57万人 → 有料転換 × ポッドキャスト広告 = 年間約4.5億円</text>

  <!-- Free newsletter -->
  <rect x="30" y="105" width="155" height="80" rx="12" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="107" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#4c1d95">無料ニュースレター</text>
  <text x="107" y="152" text-anchor="middle" font-size="11" fill="#5b21b6">57万人購読</text>
  <text x="107" y="170" text-anchor="middle" font-size="10" fill="#6d28d9">週1回・プロダクト情報</text>

  <!-- Arrow up to paid -->
  <line x1="185" y1="130" x2="230" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow down to podcast -->
  <line x1="185" y1="165" x2="230" y2="220" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Paid newsletter -->
  <rect x="230" y="90" width="185" height="85" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="322" y="113" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">有料サブスク</text>
  <text x="322" y="135" text-anchor="middle" font-size="11" fill="#475569">月額 約2,250円</text>
  <text x="322" y="153" text-anchor="middle" font-size="11" fill="#475569">有料会員 1万8千人</text>
  <text x="322" y="168" text-anchor="middle" font-size="10" fill="#64748b">（無料から4〜5%が転換）</text>

  <!-- Podcast -->
  <rect x="230" y="195" width="185" height="70" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="322" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">ポッドキャスト</text>
  <text x="322" y="238" text-anchor="middle" font-size="11" fill="#475569">スポンサー広告収入</text>
  <text x="322" y="253" text-anchor="middle" font-size="10" fill="#64748b">年間約7,500万円</text>

  <!-- Arrows to revenue -->
  <line x1="415" y1="132" x2="458" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="415" y1="230" x2="458" y2="195" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Revenue -->
  <rect x="458" y="105" width="165" height="140" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="540" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">収益内訳</text>
  <text x="540" y="155" text-anchor="middle" font-size="11" fill="#047857">有料サブスク</text>
  <text x="540" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">約4億円</text>
  <text x="540" y="195" text-anchor="middle" font-size="11" fill="#047857">ポッドキャスト広告</text>
  <text x="540" y="212" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">約7,500万円</text>
  <line x1="470" y1="222" x2="612" y2="222" stroke="#d1fae5" stroke-width="1"/>
  <text x="540" y="238" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">計 約4.5億円</text>

  <!-- Source -->
  <rect x="645" y="105" width="125" height="75" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="707" y="128" text-anchor="middle" font-size="10" fill="#92400e">情報源</text>
  <text x="707" y="148" text-anchor="middle" font-size="10" fill="#b45309">CNBC取材記事</text>
  <text x="707" y="165" text-anchor="middle" font-size="9" fill="#78350f">（2024年1月公開）</text>

  <!-- AI band -->
  <rect x="30" y="300" width="740" height="75" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="400" y="323" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b21a8">🤖 AI・自動化レイヤー</text>
  <text x="155" y="348" text-anchor="middle" font-size="11" fill="#7e22ce">AI文章補助</text>
  <text x="155" y="363" text-anchor="middle" font-size="10" fill="#9333ea">記事の構成・リサーチ補助</text>
  <text x="390" y="348" text-anchor="middle" font-size="11" fill="#7e22ce">Substack自動配信</text>
  <text x="390" y="363" text-anchor="middle" font-size="10" fill="#9333ea">購読管理・課金を自動処理</text>
  <text x="620" y="348" text-anchor="middle" font-size="11" fill="#7e22ce">ポッドキャスト制作補助</text>
  <text x="620" y="363" text-anchor="middle" font-size="10" fill="#9333ea">文字起こし・要約の自動化</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
