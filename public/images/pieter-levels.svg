<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="6" fill="#6366f1"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Pieter Levels のビジネスモデル</text>
  <text x="400" y="66" text-anchor="middle" font-size="12" fill="#64748b">3つのプロダクト × AI自動化 = 年間約5.4億円</text>

  <!-- Customer box -->
  <rect x="40" y="110" width="160" height="60" rx="12" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="120" y="137" text-anchor="middle" font-size="12" fill="#5b21b6">👤 ターゲット顧客</text>
  <text x="120" y="157" text-anchor="middle" font-size="11" fill="#7c3aed">ノマド・フリーランサー</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="140" x2="250" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Products box -->
  <rect x="250" y="95" width="200" height="150" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="350" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">プロダクト</text>
  <rect x="265" y="130" width="170" height="30" rx="6" fill="#f1f5f9"/>
  <text x="350" y="150" text-anchor="middle" font-size="11" fill="#475569">Nomad List（情報サービス）</text>
  <rect x="265" y="168" width="170" height="30" rx="6" fill="#f1f5f9"/>
  <text x="350" y="188" text-anchor="middle" font-size="11" fill="#475569">Remote OK（求人）</text>
  <rect x="265" y="206" width="170" height="30" rx="6" fill="#f1f5f9"/>
  <text x="350" y="226" text-anchor="middle" font-size="11" fill="#475569">PhotoAI（写真生成）</text>

  <!-- Arrow 2 -->
  <line x1="450" y1="170" x2="500" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Revenue box -->
  <rect x="500" y="110" width="160" height="120" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="580" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">収益モデル</text>
  <text x="580" y="158" text-anchor="middle" font-size="11" fill="#047857">年会費 約1.5万円</text>
  <text x="580" y="178" text-anchor="middle" font-size="11" fill="#047857">求人掲載 約4.5万円</text>
  <text x="580" y="198" text-anchor="middle" font-size="11" fill="#047857">サブスク 約4,500円/月</text>
  <text x="580" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">計 年間約5.4億円</text>

  <!-- AI Automation band -->
  <rect x="40" y="300" width="720" height="70" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="400" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b21a8">🤖 AI・自動化レイヤー</text>
  <text x="180" y="350" text-anchor="middle" font-size="11" fill="#7e22ce">CS自動対応</text>
  <text x="350" y="350" text-anchor="middle" font-size="11" fill="#7e22ce">インフラ監視・自動デプロイ</text>
  <text x="530" y="350" text-anchor="middle" font-size="11" fill="#7e22ce">AIコーディング支援</text>
  <text x="690" y="350" text-anchor="middle" font-size="11" fill="#7e22ce">従業員0人</text>

  <!-- Arrows down to AI band -->
  <line x1="350" y1="245" x2="350" y2="298" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-purple)"/>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c4b5fd"/>
    </marker>
  </defs>
</svg>
