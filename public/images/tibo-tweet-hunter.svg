<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="400" fill="#f8fafc"/>
  <rect x="0" y="0" width="800" height="6" fill="#0ea5e9"/>

  <text x="400" y="44" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Tibo / Tweet Hunter のビジネスモデル</text>
  <text x="400" y="66" text-anchor="middle" font-size="12" fill="#64748b">AIライティング支援SaaS → 月収約600万円 → 売却</text>

  <!-- Customer -->
  <rect x="40" y="110" width="160" height="60" rx="12" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="120" y="137" text-anchor="middle" font-size="12" fill="#075985">👤 ターゲット顧客</text>
  <text x="120" y="157" text-anchor="middle" font-size="11" fill="#0369a1">X活用クリエイター</text>

  <!-- Arrow -->
  <line x1="200" y1="140" x2="250" y2="140" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Product -->
  <rect x="250" y="95" width="200" height="130" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="350" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Tweet Hunter</text>
  <rect x="265" y="130" width="170" height="30" rx="6" fill="#e0f2fe"/>
  <text x="350" y="150" text-anchor="middle" font-size="11" fill="#0369a1">AI投稿文章の自動生成</text>
  <rect x="265" y="168" width="170" height="30" rx="6" fill="#f1f5f9"/>
  <text x="350" y="188" text-anchor="middle" font-size="11" fill="#475569">スケジュール配信</text>
  <rect x="265" y="206" width="170" height="30" rx="6" fill="#f1f5f9"/>
  <text x="350" y="226" text-anchor="middle" font-size="11" fill="#475569">バズ分析・レポート</text>

  <!-- Arrow -->
  <line x1="450" y1="160" x2="500" y2="160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Revenue -->
  <rect x="500" y="100" width="160" height="90" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="580" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">収益モデル</text>
  <text x="580" y="148" text-anchor="middle" font-size="11" fill="#047857">月額 約7,500円〜</text>
  <text x="580" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">月収 約600万円</text>
  <text x="580" y="185" text-anchor="middle" font-size="10" fill="#64748b">（ピーク時）</text>

  <!-- Exit badge -->
  <rect x="500" y="200" width="160" height="55" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="580" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#c2410c">🏆 売却成功</text>
  <text x="580" y="242" text-anchor="middle" font-size="11" fill="#ea580c">Taplio社に売却</text>

  <!-- AI band -->
  <rect x="40" y="300" width="720" height="70" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="400" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#6b21a8">🤖 AI・自動化レイヤー</text>
  <text x="180" y="352" text-anchor="middle" font-size="11" fill="#7e22ce">Claude API・GPT-4（コア機能）</text>
  <text x="430" y="352" text-anchor="middle" font-size="11" fill="#7e22ce">Stripe（課金自動化）</text>
  <text x="630" y="352" text-anchor="middle" font-size="11" fill="#7e22ce">オンボーディング自動化</text>

  <line x1="350" y1="245" x2="350" y2="298" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-purple)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c4b5fd"/>
    </marker>
  </defs>
</svg>
